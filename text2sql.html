          const leaderboardBody = document.getElementById('leaderboard-body');
          
          // 当前筛选条件
          let currentFilters = {
            type: 'all',
            openSource: 'all',
            size: 'all',
            sortBy: 'execution_accuracy-desc'
          };
          
          // 渲染榜单
          function renderLeaderboard() {
            // 应用筛选
            let filteredData = [...leaderboardData];
            
            // 按类型筛选
            if (currentFilters.type !== 'all') {
              filteredData = filteredData.filter(model => model.type === currentFilters.type);
            }
            
            // 按开源状态筛选
            if (currentFilters.openSource !== 'all') {
              const isOpenSource = currentFilters.openSource === 'true';
              filteredData = filteredData.filter(model => model.is_open_source === isOpenSource);
            }
            
            // 按模型大小筛选
            if (currentFilters.size !== 'all') {
              filteredData = filteredData.filter(model => model.size_category === currentFilters.size);
            }
            
            // 应用排序
        const [sortField, sortOrder] = currentFilters.sortBy.split('-');
        filteredData.sort((a, b) => {
          let aValue, bValue;
          
          // 处理指标字段，它们都在metrics对象中
          const metricsFields = ['execution_accuracy', 'logical_equivalence', 'response_time', 'complex_query'];
          if (metricsFields.includes(sortField)) {
            // 指标字段，从metrics对象中获取
            aValue = a.metrics[sortField];
            bValue = b.metrics[sortField];
          } else {
            // 其他字段，直接获取
            aValue = a[sortField];
            bValue = b[sortField];
          }
          
          // 数字排序
          if (typeof aValue === 'number' && typeof bValue === 'number') {
            return sortOrder === 'desc' ? bValue - aValue : aValue - bValue;
          }
          
          // 字符串排序
          if (typeof aValue === 'string' && typeof bValue === 'string') {
            return sortOrder === 'desc' 
              ? bValue.localeCompare(aValue)
              : aValue.localeCompare(bValue);
          }
          
          // 默认不排序
          return 0;
        });
            
            // 渲染表格

              row.dataset.executionAccuracy = model.metrics.execution_accuracy;
              
              row.innerHTML = `

              if (this.dataset.type) filterType = 'type';
              if (this.dataset.openSource) filterType = 'openSource';
              if (this.dataset.size) filterType = 'size';
              
              // 更新按钮状态
              const siblings = Array.from(this.parentElement.children);
              siblings.forEach(sibling => sibling.classList.remove('active'));
              this.classList.add('active');
              
              // 更新筛选条件
              if (filterType === 'type') {
                currentFilters.type = this.dataset.type;
              } else if (filterType === 'openSource') {
                currentFilters.openSource = this.dataset.openSource;
              } else if (filterType === 'size') {
                currentFilters.size = this.dataset.size;
              }
              
              // 重新渲染榜单
              renderLeaderboard();
            });
          });
          
          // 排序选择事件
          sortSelect.addEventListener('change', function() {
            currentFilters.sortBy = this.value;
            renderLeaderboard();
          });
          
          // 初始化渲染
          renderLeaderboard();
        });

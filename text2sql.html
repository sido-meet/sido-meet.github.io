              `;
              
              leaderboardBody.appendChild(row);
            });
          }
          
          // 筛选按钮点击事件
          filterBtns.forEach(btn => {
            btn.addEventListener('click', function() {
              // 确定筛选类型
              let filterType;
              if (this.dataset.type) filterType = 'type';
              if (this.dataset.openSource) filterType = 'openSource';
              if (this.dataset.size) filterType = 'size';
              
              // 更新按钮状态
              const siblings = Array.from(this.parentElement.children);
              siblings.forEach(sibling => sibling.classList.remove('active'));
              this.classList.add('active');
              
              // 更新筛选条件
              if (filterType === 'type') {
                currentFilters.type = this.dataset.type;
              } else if (filterType === 'openSource') {
                currentFilters.openSource = this.dataset.openSource;
              } else if (filterType === 'size') {
                currentFilters.size = this.dataset.size;
              }
              
              // 重新渲染榜单
              renderLeaderboard();
            });
          });
          
          // 排序选择事件
          sortSelect.addEventListener('change', function() {
            currentFilters.sortBy = this.value;
            renderLeaderboard();
          });
          
          // 初始化渲染
          renderLeaderboard();
        });
      </script>
    </div>
  </div>

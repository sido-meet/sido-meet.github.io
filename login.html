<script>
function handleLogin() {
  // 获取表单数据
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;
  
  // 简单的前端验证
  if (!username || !password) {
    alert('请输入用户名和密码');
    return;
  }
  
  // 这里可以添加实际的登录逻辑，比如调用API
  // 目前我们只是模拟登录成功，然后返回原页面
  alert('登录成功！');
  
  // 返回上一个页面
  window.history.back();
}

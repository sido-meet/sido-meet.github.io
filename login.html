  <h2>用户登录</h2>
  <form class="login-form" onsubmit="event.preventDefault(); handleLogin();">
    <div class="form-group">
      <label for="username">用户名</label>
      <input type="text" id="username" name="username" placeholder="请输入用户名" required>
    </div>
    <div class="form-group">
      <label for="password">密码</label>
      <input type="password" id="password" name="password" placeholder="请输入密码" required>
    </div>
    <div class="form-actions">
      <button type="submit" class="login-button">登录</button>
      <a href="/" class="cancel-button">取消</a>
    </div>
  </form>
</div>

<script>
async function handleLogin() {
  // 获取表单数据
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;
  
  // 简单的前端验证
  if (!username || !password) {
    alert('请输入用户名和密码');
    return;
  }
  
  try {
    // 调用后端登录API
    const response = await fetch('http://47.100.112.221:8000/api/auth/login', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/x-www-form-urlencoded'
      },
      body: `username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`
    });
    
    if (!response.ok) {
      const errorData = await response.json();
      throw new Error(errorData.detail || '登录失败');
    }
    
    // 解析响应数据
    const data = await response.json();
    
    // 存储JWT令牌到localStorage
    localStorage.setItem('token', data.access_token);
    localStorage.setItem('token_type', data.token_type);
    
    // 显示成功消息
    alert('登录成功！');
    
    // 返回上一个页面
    window.history.back();
  } catch (error) {
    // 处理错误
    alert('登录失败：' + error.message);
  }
}

// 注册功能
async function handleRegister() {
  // 获取表单数据
  const username = document.getElementById('register-username').value;
  const email = document.getElementById('register-email').value;
  const password = document.getElementById('register-password').value;
  
  // 简单的前端验证
  if (!username || !email || !password) {
    alert('请填写所有必填字段');
    return;
  }
  
  try {
    // 调用后端注册API
    const response = await fetch('http://47.100.112.221:8000/api/auth/register', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        username: username,
        email: email,
        password: password
      })
    });
    
    if (!response.ok) {
      const errorData = await response.json();
      throw new Error(errorData.detail || '注册失败');
    }
    
    // 显示成功消息
    alert('注册成功！请登录');
    
    // 切换到登录表单
    document.getElementById('register-form').style.display = 'none';
    document.getElementById('login-form').style.display = 'block';
  } catch (error) {
    // 处理错误
    alert('注册失败：' + error.message);
  }
}
</script>
